<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Prismian — AI-safe access to your team's data, over MCP">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamIn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#475569" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="prismEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="#ffffff"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- ── prism mark ── -->
  <g transform="translate(150 110)">
    <!-- incoming beam (one source) -->
    <line x1="-110" y1="70" x2="14" y2="70" stroke="url(#beamIn)" stroke-width="5" stroke-linecap="round"/>

    <!-- prism triangle -->
    <path d="M16 18 L104 70 L16 122 Z" fill="#0f172a" stroke="url(#prismEdge)" stroke-width="3" stroke-linejoin="round"/>

    <!-- refracted spectrum (scoped streams out) -->
    <line x1="104" y1="70" x2="232" y2="34"  stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
    <line x1="104" y1="70" x2="232" y2="58"  stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
    <line x1="104" y1="70" x2="232" y2="82"  stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
    <line x1="104" y1="70" x2="232" y2="106" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- ── wordmark + tagline ── -->
  <text x="430" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="-2" fill="#0f172a">Prismian</text>
  <text x="432" y="222" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="-0.2" fill="#047857">AI-safe access to your team&#39;s data, over MCP.</text>
  <text x="432" y="262" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" font-weight="400" letter-spacing="-0.2" fill="#64748b">Connect Postgres once &#8212; scoped, audited, column-redacted reads for every AI tool.</text>
</svg>
